# =============================================
# Akuma Threads - Application Configuration
# =============================================

# Application name
spring.application.name=akuma-threads

# Disable DevTools auto-restart — prevents ERR_INCOMPLETE_CHUNKED_ENCODING
spring.devtools.restart.enabled=false

# Server port
server.port=8080

# =============================================
# DATABASE - MySQL
# =============================================
# Replace 'your_password' with your MySQL root password
spring.datasource.url=jdbc:mysql://localhost:3306/akuma_threads?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP connection pool — explicit sizing instead of defaults.
# max-pool-size 10 fits a t3.micro RDS instance (max_connections ≈ 60)
# while leaving headroom for a second app instance + admin connections.
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.keepalive-time=300000

# Graceful shutdown — finish in-flight requests (incl. Stripe webhooks) before exit.
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

# Gzip responses — HTML/CSS/JS compress ~70%, big win on mobile.
server.compression.enabled=true
server.compression.mime-types=text/html,text/css,application/javascript,application/json,image/svg+xml
server.compression.min-response-size=1024

# Browser caching for static assets (/css, /js, /img). Without this every
# page view re-downloads every asset. 1 day balances speed against deploy
# freshness; move to content-hash versioning (resources.chain.strategy.content)
# for immutable caching once templates are click-through verified.
spring.web.resources.cache.cachecontrol.max-age=1d
spring.web.resources.cache.cachecontrol.cache-public=true

# JPA / Hibernate
# 'update' auto-creates/updates tables from your entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Hibernate batch processing — reduces round-trips when persisting many entities at once.
# jdbc.batch_size=20 means Hibernate sends 20 INSERTs/UPDATEs in a single JDBC batch.
# order_inserts/order_updates group statements by entity type so consecutive same-type
# statements can be batched even when multiple entity types are saved in one transaction.
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# =============================================
# THYMELEAF
# =============================================
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# =============================================
# LOGGING
# =============================================
logging.level.com.akumathreads=DEBUG
logging.level.org.springframework.security=INFO

# =============================================
# SESSION
# =============================================
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
# same-site=strict set at TomcatContextCustomizer level in SecurityConfig
# secure=false in dev (HTTP); set to true in application-prod.properties

# =============================================
# PRINTFUL INTEGRATION
# =============================================
# Set the PRINTFUL_API_KEY environment variable on your machine or server.
# NEVER hard-code the API key here — use the environment variable instead.
#
# How to set it locally (Windows PowerShell, permanent):
#   [System.Environment]::SetEnvironmentVariable("PRINTFUL_API_KEY","your_key_here","User")
# Then restart IntelliJ so it picks up the new variable.
#
# The :not-configured fallback means the app starts safely without the key —
# Printful calls will just return fallback rates until the key is provided.
printful.api.key=${PRINTFUL_API_KEY:not-configured}

# =============================================
# EMAIL (Gmail SMTP)
# =============================================
# Real credentials go in application-local.properties (gitignored).
# These placeholders make the app start safely without email configured.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME:noreply@example.com}
spring.mail.password=${GMAIL_APP_PASSWORD:not-configured}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

# Base URL used for building links in emails
app.base-url=http://localhost:8080

# =============================================
# STRIPE PAYMENTS
# =============================================
stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:pk_test_placeholder}
stripe.secret-key=${STRIPE_SECRET_KEY:sk_test_placeholder}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}

# =============================================
# ACTUATOR — health check for AWS ALB / ECS / Elastic Beanstalk
# Only /actuator/health is exposed; all other endpoints are hidden.
# =============================================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
# Liveness/readiness groups — point the ALB health check at
# /actuator/health/readiness so instances are only marked healthy
# once the DB connection pool is actually up.
management.endpoint.health.probes.enabled=true
# The default readiness group contains ONLY the readinessState indicator —
# it does NOT check the database. Include the db indicator explicitly so a
# lost RDS connection actually pulls the instance out of the target group.
management.endpoint.health.group.readiness.include=readinessState,db

# =============================================
# ASYNC (used for non-blocking email sending)
# =============================================
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100
