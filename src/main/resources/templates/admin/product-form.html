<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head(${editMode ? 'Edit Design' : 'Upload Design'})}"></head>

<body class="bg-[#0a0a0a] text-white min-h-screen flex flex-col">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="flex-1 max-w-3xl mx-auto w-full px-6 sm:px-10 py-14">

    <!-- ── Page header ──────────────────────────────────────────────────────── -->
    <div class="mb-12 border-b border-[#1a1a1a] pb-8">
        <p class="font-mono text-[10px] tracking-[0.3em] uppercase text-[#e50914] mb-3">
            Admin / <span th:text="${editMode ? 'Edit Design' : 'New Design'}"></span>
        </p>
        <h1 style="font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
                   font-size: clamp(2rem, 5vw, 3.5rem);
                   line-height: 0.9;
                   letter-spacing: -0.02em;"
            th:text="${editMode ? 'EDIT DESIGN' : 'UPLOAD DESIGN'}">
            UPLOAD DESIGN
        </h1>
    </div>

    <!-- ── Form ─────────────────────────────────────────────────────────────── -->
    <form th:action="@{/admin/product/save}"
          th:object="${form}"
          method="post"
          class="space-y-8">

        <!-- ── Global field errors (inside th:object scope) ─────────────── -->
        <div th:if="${#fields.hasAnyErrors()}"
             class="border border-[#e50914] bg-[#e50914]/10 px-6 py-4">
            <p class="font-mono text-[10px] tracking-[0.2em] uppercase text-[#e50914] mb-2">Fix the following errors:</p>
            <ul class="list-none m-0 p-0">
                <li th:each="err : ${#fields.allErrors()}"
                    class="font-mono text-[10px] text-[#e50914] tracking-wide"
                    th:text="— ${err}"></li>
            </ul>
        </div>

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <!-- Hidden id field for edit mode -->
        <input type="hidden" th:field="*{id}"/>

        <!-- ── Title ─────────────────────────────────────────────────────── -->
        <div class="space-y-2">
            <label class="font-mono text-[10px] tracking-[0.25em] uppercase text-[#555]"
                   for="name">Design Title</label>
            <input type="text"
                   id="name"
                   th:field="*{name}"
                   placeholder="e.g. Onigiri Oni Hoodie"
                   class="w-full bg-transparent border border-[#222] text-white font-mono text-[13px]
                          px-4 py-3 focus:outline-none focus:border-[#e50914]
                          placeholder-[#333] transition-colors duration-200"/>
            <p th:if="${#fields.hasErrors('name')}"
               th:errors="*{name}"
               class="font-mono text-[10px] text-[#e50914] tracking-wide"></p>
        </div>

        <!-- ── Price ─────────────────────────────────────────────────────── -->
        <div class="space-y-2">
            <label class="font-mono text-[10px] tracking-[0.25em] uppercase text-[#555]"
                   for="price">Price (USD)</label>
            <div class="relative">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 font-mono text-[13px] text-[#444]">$</span>
                <input type="number"
                       id="price"
                       th:field="*{price}"
                       step="0.01"
                       min="0.01"
                       placeholder="45.00"
                       class="w-full bg-transparent border border-[#222] text-white font-mono text-[13px]
                              pl-8 pr-4 py-3 focus:outline-none focus:border-[#e50914]
                              placeholder-[#333] transition-colors duration-200"/>
            </div>
            <p th:if="${#fields.hasErrors('price')}"
               th:errors="*{price}"
               class="font-mono text-[10px] text-[#e50914] tracking-wide"></p>
        </div>

        <!-- ── Category ──────────────────────────────────────────────────── -->
        <div class="space-y-2">
            <label class="font-mono text-[10px] tracking-[0.25em] uppercase text-[#555]"
                   for="category">Category</label>
            <select id="category"
                    th:field="*{category}"
                    class="w-full bg-[#0a0a0a] border border-[#222] text-white font-mono text-[13px]
                           px-4 py-3 focus:outline-none focus:border-[#e50914]
                           transition-colors duration-200 appearance-none cursor-pointer">
                <option value="" disabled>Select category…</option>
                <option th:each="cat : ${categories}"
                        th:value="${cat}"
                        th:text="${cat}"></option>
            </select>
            <p th:if="${#fields.hasErrors('category')}"
               th:errors="*{category}"
               class="font-mono text-[10px] text-[#e50914] tracking-wide"></p>
        </div>

        <!-- ── Description ───────────────────────────────────────────────── -->
        <div class="space-y-2">
            <label class="font-mono text-[10px] tracking-[0.25em] uppercase text-[#555]"
                   for="description">Description</label>
            <textarea id="description"
                      th:field="*{description}"
                      rows="4"
                      placeholder="Tell the story behind this drop…"
                      class="w-full bg-transparent border border-[#222] text-white font-mono text-[13px]
                             px-4 py-3 focus:outline-none focus:border-[#e50914]
                             placeholder-[#333] transition-colors duration-200 resize-y"></textarea>
        </div>

        <!-- ── Image URL ──────────────────────────────────────────────────── -->
        <div class="space-y-2">
            <label class="font-mono text-[10px] tracking-[0.25em] uppercase text-[#555]"
                   for="imageUrl">Image URL</label>
            <input type="text"
                   id="imageUrl"
                   th:field="*{imageUrl}"
                   placeholder="https://… or /img/my-design.jpg"
                   class="w-full bg-transparent border border-[#222] text-white font-mono text-[13px]
                          px-4 py-3 focus:outline-none focus:border-[#e50914]
                          placeholder-[#333] transition-colors duration-200"/>
            <p class="font-mono text-[9px] tracking-[0.15em] text-[#333] uppercase">
                Paste a Printify CDN URL or a local /img/ path
            </p>
            <!-- Live preview -->
            <div id="img-preview"
                 class="mt-3 w-32 h-32 border border-[#1a1a1a] overflow-hidden hidden">
                <img id="preview-img" src="" alt="Preview" class="w-full h-full object-cover"/>
            </div>
        </div>

        <!-- ── Size + Stock grid ──────────────────────────────────────────── -->
        <div class="space-y-4">
            <label class="font-mono text-[10px] tracking-[0.25em] uppercase text-[#555] block">
                Stock per Size
            </label>
            <div class="grid grid-cols-3 sm:grid-cols-6 gap-3">

                <!-- XS -->
                <div class="space-y-1 text-center">
                    <p class="font-mono text-[9px] tracking-[0.2em] text-[#444] uppercase">XS</p>
                    <input type="number" th:field="*{stockXs}" min="0"
                           class="w-full bg-transparent border border-[#222] text-white font-mono text-[13px]
                                  text-center py-2 focus:outline-none focus:border-[#e50914]
                                  transition-colors duration-200"/>
                </div>

                <!-- S -->
                <div class="space-y-1 text-center">
                    <p class="font-mono text-[9px] tracking-[0.2em] text-[#444] uppercase">S</p>
                    <input type="number" th:field="*{stockS}" min="0"
                           class="w-full bg-transparent border border-[#222] text-white font-mono text-[13px]
                                  text-center py-2 focus:outline-none focus:border-[#e50914]
                                  transition-colors duration-200"/>
                </div>

                <!-- M -->
                <div class="space-y-1 text-center">
                    <p class="font-mono text-[9px] tracking-[0.2em] text-[#444] uppercase">M</p>
                    <input type="number" th:field="*{stockM}" min="0"
                           class="w-full bg-transparent border border-[#222] text-white font-mono text-[13px]
                                  text-center py-2 focus:outline-none focus:border-[#e50914]
                                  transition-colors duration-200"/>
                </div>

                <!-- L -->
                <div class="space-y-1 text-center">
                    <p class="font-mono text-[9px] tracking-[0.2em] text-[#444] uppercase">L</p>
                    <input type="number" th:field="*{stockL}" min="0"
                           class="w-full bg-transparent border border-[#222] text-white font-mono text-[13px]
                                  text-center py-2 focus:outline-none focus:border-[#e50914]
                                  transition-colors duration-200"/>
                </div>

                <!-- XL -->
                <div class="space-y-1 text-center">
                    <p class="font-mono text-[9px] tracking-[0.2em] text-[#444] uppercase">XL</p>
                    <input type="number" th:field="*{stockXl}" min="0"
                           class="w-full bg-transparent border border-[#222] text-white font-mono text-[13px]
                                  text-center py-2 focus:outline-none focus:border-[#e50914]
                                  transition-colors duration-200"/>
                </div>

                <!-- XXL -->
                <div class="space-y-1 text-center">
                    <p class="font-mono text-[9px] tracking-[0.2em] text-[#444] uppercase">XXL</p>
                    <input type="number" th:field="*{stockXxl}" min="0"
                           class="w-full bg-transparent border border-[#222] text-white font-mono text-[13px]
                                  text-center py-2 focus:outline-none focus:border-[#e50914]
                                  transition-colors duration-200"/>
                </div>

            </div>
        </div>

        <!-- ── Actions ────────────────────────────────────────────────────── -->
        <div class="flex items-center gap-6 pt-6 border-t border-[#1a1a1a]">
            <button type="submit"
                    class="font-mono text-[11px] tracking-[0.2em] uppercase font-bold
                           bg-[#e50914] text-white px-8 py-4
                           hover:bg-[#b8070f] transition-colors duration-200">
                <span th:text="${editMode ? 'Save Changes' : 'Upload Design'}">Upload Design</span>
            </button>

            <a th:href="@{/admin/dashboard}"
               class="font-mono text-[10px] tracking-[0.2em] uppercase text-[#444]
                      hover:text-white transition-colors duration-200">
                ← Back to Dashboard
            </a>
        </div>
    </form>

</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script th:replace="~{fragments/layout :: themeScript}"></script>

<!-- Image URL live preview -->
<script>
    document.getElementById('imageUrl').addEventListener('input', function () {
        var url = this.value.trim();
        var preview = document.getElementById('img-preview');
        var img = document.getElementById('preview-img');
        if (url) {
            img.src = url;
            preview.classList.remove('hidden');
        } else {
            preview.classList.add('hidden');
        }
    });

    // Fire on load for edit mode (pre-filled URL)
    window.addEventListener('DOMContentLoaded', function () {
        var url = document.getElementById('imageUrl').value.trim();
        if (url) {
            document.getElementById('preview-img').src = url;
            document.getElementById('img-preview').classList.remove('hidden');
        }
    });
</script>

</body>
</html>
