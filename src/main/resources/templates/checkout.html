<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      class="dark">

<head th:replace="~{fragments/layout :: head('Checkout')}"></head>

<body class="bg-[#0a0a0a] text-white min-h-screen flex flex-col">

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="flex-1 max-w-7xl mx-auto w-full px-6 sm:px-10 py-14">

    <!-- ── Page header ──────────────────────────────────────────────────────── -->
    <div class="mb-12 border-b border-[#1a1a1a] pb-8">
        <p class="font-mono text-[10px] tracking-[0.35em] uppercase text-[#e50914] mb-3">
            Olly Threads / Checkout
        </p>
        <h1 style="font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
                   font-size: clamp(2.5rem, 6vw, 4.5rem);
                   line-height: 0.9;
                   letter-spacing: -0.02em;">
            CHECKOUT
        </h1>
    </div>

    <!-- ── Stock error flash ────────────────────────────────────────────────── -->
    <div th:if="${stockError}"
         class="border border-[#e50914] bg-[#e50914]/10 px-6 py-4 mb-8">
        <p class="font-mono text-[11px] tracking-[0.15em] text-[#e50914]"
           th:text="${stockError}"></p>
    </div>

    <!-- ── Two-column layout ────────────────────────────────────────────────── -->
    <div class="flex flex-col lg:flex-row gap-px bg-[#1a1a1a]">

        <!-- ══ LEFT: Cart review ═══════════════════════════════════════════════ -->
        <div class="lg:w-[45%] bg-[#0a0a0a] p-8 lg:p-10">
            <p class="font-mono text-[10px] tracking-[0.25em] uppercase text-[#444] mb-6">
                YOUR ORDER
            </p>

            <!-- Cart line items -->
            <div class="space-y-0 border-t border-[#1a1a1a]">
                <div th:each="item : ${cart.items}"
                     class="flex items-start justify-between py-5 border-b border-[#1a1a1a] gap-4">
                    <div class="flex-1">
                        <p class="font-mono text-[12px] tracking-[0.05em] uppercase font-bold text-white"
                           th:text="${item.productName}">Product</p>
                        <p class="font-mono text-[10px] text-[#444] mt-1 tracking-[0.15em]">
                            QTY: <span th:text="${item.quantity}">1</span>
                        </p>
                    </div>
                    <div class="text-right shrink-0">
                        <p class="font-mono text-[13px] font-bold text-white"
                           th:text="'$' + ${#numbers.formatDecimal(item.unitPrice.multiply(T(java.math.BigDecimal).valueOf(item.quantity)), 1, 2)}">
                            $0.00
                        </p>
                        <p class="font-mono text-[10px] text-[#444] mt-0.5"
                           th:text="'$' + ${#numbers.formatDecimal(item.unitPrice, 1, 2)} + ' ea.'">
                            $0.00 ea.
                        </p>
                    </div>
                </div>
            </div>

            <!-- Subtotal -->
            <div class="flex items-center justify-between pt-6 mt-2">
                <p class="font-mono text-[10px] tracking-[0.25em] uppercase text-[#444]">SUBTOTAL</p>
                <p class="font-mono text-[14px] font-bold text-white"
                   th:text="'$' + ${#numbers.formatDecimal(cart.subtotal(), 1, 2)}">$0.00</p>
            </div>
            <div class="flex items-center justify-between py-3 border-t border-[#1a1a1a] mt-3">
                <p class="font-mono text-[10px] tracking-[0.25em] uppercase text-[#444]">SHIPPING</p>
                <p class="font-mono text-[11px] text-[#444]">Calculated at fulfillment</p>
            </div>

            <!-- ORDER TOTAL -->
            <div class="flex items-end justify-between pt-6 border-t border-[#e50914] mt-2">
                <p style="font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
                           font-size: 1.1rem;
                           letter-spacing: 0.05em;"
                   class="text-white uppercase">ORDER TOTAL</p>
                <p style="font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
                           font-size: 2rem;
                           letter-spacing: -0.01em;
                           color: #ffffff;"
                   th:text="'$' + ${#numbers.formatDecimal(cart.subtotal(), 1, 2)}">$0.00</p>
            </div>
        </div>

        <!-- ══ RIGHT: Shipping form ════════════════════════════════════════════ -->
        <div class="lg:w-[55%] bg-[#0a0a0a] p-8 lg:p-10">
            <p class="font-mono text-[10px] tracking-[0.25em] uppercase text-[#444] mb-6">
                SHIPPING INFORMATION
            </p>

            <form th:action="@{/checkout}"
                  th:object="${form}"
                  method="post"
                  class="space-y-6">

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <!-- ── Full Name ── -->
                <div class="space-y-2">
                    <label class="font-mono text-[10px] tracking-[0.2em] uppercase text-[#444]"
                           for="fullName">Full Name *</label>
                    <input type="text" id="fullName" th:field="*{fullName}"
                           placeholder="Your full name"
                           class="w-full bg-transparent border border-[#222] text-white
                                  font-mono text-[13px] px-4 py-3
                                  focus:outline-none focus:border-[#e50914] transition-colors duration-200
                                  placeholder-[#333]"/>
                    <p th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"
                       class="font-mono text-[10px] text-[#e50914]"></p>
                </div>

                <!-- ── Email ── -->
                <div class="space-y-2">
                    <label class="font-mono text-[10px] tracking-[0.2em] uppercase text-[#444]"
                           for="email">Email *</label>
                    <input type="email" id="email" th:field="*{email}"
                           placeholder="you@example.com"
                           class="w-full bg-transparent border border-[#222] text-white
                                  font-mono text-[13px] px-4 py-3
                                  focus:outline-none focus:border-[#e50914] transition-colors duration-200
                                  placeholder-[#333]"/>
                    <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}"
                       class="font-mono text-[10px] text-[#e50914]"></p>
                </div>

                <!-- ── Address ── -->
                <div class="space-y-2">
                    <label class="font-mono text-[10px] tracking-[0.2em] uppercase text-[#444]"
                           for="address">Street Address *</label>
                    <input type="text" id="address" th:field="*{address}"
                           placeholder="123 Main St"
                           class="w-full bg-transparent border border-[#222] text-white
                                  font-mono text-[13px] px-4 py-3
                                  focus:outline-none focus:border-[#e50914] transition-colors duration-200
                                  placeholder-[#333]"/>
                    <p th:if="${#fields.hasErrors('address')}" th:errors="*{address}"
                       class="font-mono text-[10px] text-[#e50914]"></p>
                </div>

                <!-- ── Address 2 (optional) ── -->
                <div class="space-y-2">
                    <label class="font-mono text-[10px] tracking-[0.2em] uppercase text-[#444]"
                           for="address2">Apt / Suite / Unit <span class="text-[#333]">(optional)</span></label>
                    <input type="text" id="address2" th:field="*{address2}"
                           placeholder="Apt 4B"
                           class="w-full bg-transparent border border-[#222] text-white
                                  font-mono text-[13px] px-4 py-3
                                  focus:outline-none focus:border-[#e50914] transition-colors duration-200
                                  placeholder-[#333]"/>
                </div>

                <!-- ── City / State / ZIP ── -->
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div class="space-y-2 sm:col-span-1">
                        <label class="font-mono text-[10px] tracking-[0.2em] uppercase text-[#444]"
                               for="city">City *</label>
                        <input type="text" id="city" th:field="*{city}"
                               placeholder="New York"
                               class="w-full bg-transparent border border-[#222] text-white
                                      font-mono text-[13px] px-4 py-3
                                      focus:outline-none focus:border-[#e50914] transition-colors duration-200
                                      placeholder-[#333]"/>
                        <p th:if="${#fields.hasErrors('city')}" th:errors="*{city}"
                           class="font-mono text-[10px] text-[#e50914]"></p>
                    </div>
                    <div class="space-y-2">
                        <label class="font-mono text-[10px] tracking-[0.2em] uppercase text-[#444]"
                               for="state">State *</label>
                        <input type="text" id="state" th:field="*{state}"
                               placeholder="NY"
                               class="w-full bg-transparent border border-[#222] text-white
                                      font-mono text-[13px] px-4 py-3
                                      focus:outline-none focus:border-[#e50914] transition-colors duration-200
                                      placeholder-[#333]"/>
                        <p th:if="${#fields.hasErrors('state')}" th:errors="*{state}"
                           class="font-mono text-[10px] text-[#e50914]"></p>
                    </div>
                    <div class="space-y-2">
                        <label class="font-mono text-[10px] tracking-[0.2em] uppercase text-[#444]"
                               for="zip">ZIP *</label>
                        <input type="text" id="zip" th:field="*{zip}"
                               placeholder="10001"
                               class="w-full bg-transparent border border-[#222] text-white
                                      font-mono text-[13px] px-4 py-3
                                      focus:outline-none focus:border-[#e50914] transition-colors duration-200
                                      placeholder-[#333]"/>
                        <p th:if="${#fields.hasErrors('zip')}" th:errors="*{zip}"
                           class="font-mono text-[10px] text-[#e50914]"></p>
                    </div>
                </div>

                <!-- ── Country ── -->
                <div class="space-y-2">
                    <label class="font-mono text-[10px] tracking-[0.2em] uppercase text-[#444]"
                           for="country">Country *</label>
                    <input type="text" id="country" th:field="*{country}"
                           placeholder="United States"
                           class="w-full bg-transparent border border-[#222] text-white
                                  font-mono text-[13px] px-4 py-3
                                  focus:outline-none focus:border-[#e50914] transition-colors duration-200
                                  placeholder-[#333]"/>
                    <p th:if="${#fields.hasErrors('country')}" th:errors="*{country}"
                       class="font-mono text-[10px] text-[#e50914]"></p>
                </div>

                <!-- ── Submit ── -->
                <div class="pt-4 border-t border-[#1a1a1a]">
                    <button type="submit"
                            class="w-full font-mono text-[11px] tracking-[0.25em] uppercase font-bold
                                   bg-[#e50914] text-white px-8 py-4
                                   hover:bg-[#b8070f] transition-colors duration-200">
                        PLACE ORDER
                    </button>
                    <p class="font-mono text-[9px] text-[#333] tracking-[0.15em] uppercase text-center mt-4">
                        By placing an order you agree to our
                        <a th:href="@{/terms-of-service}" class="text-[#444] hover:text-white">Terms of Service</a>
                    </p>
                </div>
            </form>
        </div>
    </div>

</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: themeScript}"></div>

</body>
</html>
