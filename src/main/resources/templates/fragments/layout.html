<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!--
  ============================================================
  HEAD FRAGMENT
  Usage: <div th:replace="~{fragments/layout :: head('Page Title')}"></div>
  ============================================================
-->
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <!-- CSP is enforced by Spring Security SecurityConfig — this meta tag is a belt-and-suspenders hint for browsers that read it before the HTTP header. -->
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; script-src 'self' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'none'; form-action 'self'"/>

    <title th:text="${title} + ' — Olly Threads'">Olly Threads</title>

    <!-- Signature font — Pinyon Script for the brand wordmark -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&display=swap" rel="stylesheet"/>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand:        '#e50914',
                        'brand-dark': '#b8070f'
                    },
                    fontFamily: {
                        sans:      ['Inter', 'system-ui', 'sans-serif'],
                        signature: ['"Pinyon Script"', 'cursive']
                    }
                }
            }
        }
    </script>

    <!-- Theme init — before first paint to prevent flash -->
    <script>
        (function () {
            var saved = localStorage.getItem('olly-theme');
            var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (saved === 'dark' || (!saved && prefersDark)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>

    <!-- CSRF meta tags for JS fetch calls -->
    <meta name="_csrf"        th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

    <link rel="stylesheet" th:href="@{/css/main.css}"/>

    <!-- Cart badge initialises on every page load and exposes addToCart / removeFromCart globally -->
    <script type="module" th:src="@{/js/cart.js}"></script>
</head>

<!--
  ============================================================
  NAVBAR FRAGMENT
  Usage: <div th:replace="~{fragments/layout :: navbar}"></div>
  ============================================================
-->
<nav th:fragment="navbar"
     class="sticky top-0 z-50 bg-[#0a0a0a] border-b border-[#1a1a1a]">
    <div class="max-w-7xl mx-auto px-6 sm:px-10 h-16 flex items-center justify-between">

        <!-- Brand — actual handwritten signature image, inverted to white -->
        <a th:href="@{/}"
           class="group flex items-center leading-none hover:opacity-70 transition-opacity duration-200">
            <!--
              signature.png is the artist's handwritten mark (black ink on white).
              filter: invert(1) flips it to white-on-transparent for the dark navbar.
              Place the file at: src/main/resources/static/img/signature.png
            -->
            <img th:src="@{/img/signature.png}"
                 alt="Olly Threads"
                 style="height:42px; width:auto; filter:invert(1); opacity:0.9;"
                 onerror="this.style.display='none'; this.nextElementSibling.style.display='inline'"/>
            <!-- Fallback: shown if image hasn't been added yet -->
            <span style="display:none; font-family:'Pinyon Script',cursive; font-size:2rem; color:#fff; line-height:1;">
                Olly Threads
            </span>
        </a>

        <!-- Nav links -->
        <ul class="hidden md:flex items-center gap-8 list-none m-0 p-0">
            <li>
                <a th:href="@{/shop}"
                   class="font-mono text-[11px] font-bold tracking-[0.2em] uppercase text-[#555] hover:text-white transition-colors duration-200">
                    Shop
                </a>
            </li>
            <li sec:authorize="isAuthenticated()">
                <a th:href="@{/cart}"
                   class="relative font-mono text-[11px] font-bold tracking-[0.2em] uppercase text-[#555] hover:text-white transition-colors duration-200">
                    Cart
                    <span id="cart-count"
                          class="hidden absolute -top-2 -right-5 bg-[#e50914] text-white text-[9px] font-bold rounded-full w-4 h-4 inline-flex items-center justify-center">
                        0
                    </span>
                </a>
            </li>
            <li sec:authorize="isAuthenticated()">
                <a th:href="@{/account/orders}"
                   class="font-mono text-[11px] font-bold tracking-[0.2em] uppercase text-[#555] hover:text-white transition-colors duration-200">
                    My Orders
                </a>
            </li>
            <li sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/admin/dashboard}"
                   class="font-mono text-[11px] font-bold tracking-[0.2em] uppercase text-[#e50914] hover:text-white transition-colors duration-200">
                    Admin
                </a>
            </li>
        </ul>

        <!-- Right controls -->
        <div class="flex items-center gap-4">

            <!-- Dark-mode toggle -->
            <button id="theme-toggle"
                    onclick="toggleDark()"
                    aria-label="Toggle dark mode"
                    class="p-1.5 text-[#444] hover:text-white transition-colors duration-200">
                <svg class="hidden dark:block w-4 h-4" xmlns="http://www.w3.org/2000/svg"
                     fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M12 3v1m0 16v1m8.66-9h-1M4.34 12h-1m15.07-6.36-.71.71M5.64 18.36l-.71.71M18.36 18.36l-.71-.71M5.64 5.64l-.71-.71M12 7a5 5 0 1 0 0 10A5 5 0 0 0 12 7z"/>
                </svg>
                <svg class="block dark:hidden w-4 h-4" xmlns="http://www.w3.org/2000/svg"
                     fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 1 0 9.79 9.79z"/>
                </svg>
            </button>

            <sec:authorize access="isAuthenticated()">
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit"
                            class="font-mono text-[11px] font-bold tracking-[0.2em] uppercase text-[#555] hover:text-white transition-colors duration-200">
                        Logout
                    </button>
                </form>
            </sec:authorize>

            <sec:authorize access="!isAuthenticated()">
                <a th:href="@{/login}"
                   class="font-mono text-[11px] font-bold tracking-[0.2em] uppercase text-[#555] hover:text-white transition-colors duration-200">
                    Login
                </a>
                <a th:href="@{/register}"
                   class="font-mono text-[11px] font-bold tracking-[0.2em] uppercase text-white border border-[#e50914] px-4 py-2 hover:bg-[#e50914] transition-colors duration-200">
                    Sign Up
                </a>
            </sec:authorize>
        </div>
    </div>
</nav>

<!--
  ============================================================
  FOOTER FRAGMENT
  ============================================================
-->
<footer th:fragment="footer"
        class="border-t border-[#1a1a1a] bg-[#0a0a0a] py-10 mt-auto">
    <div class="max-w-7xl mx-auto px-6 sm:px-10 space-y-4">
        <!-- Top row: wordmark + copyright -->
        <div class="flex flex-col sm:flex-row items-center justify-between gap-3">
            <span style="font-family:'Pinyon Script',cursive; font-size:1.5rem; color:#333; line-height:1;">
                Olly Threads
            </span>
            <p class="font-mono text-[10px] text-[#333] tracking-[0.2em] uppercase">
                © 2026 — Original Anime Artist Clothing by @oliver_jin_wang
            </p>
        </div>
        <!-- Legal links -->
        <div class="flex flex-wrap items-center justify-center sm:justify-end gap-6 border-t border-[#111] pt-4">
            <a th:href="@{/privacy-policy}"
               class="font-mono text-[9px] tracking-[0.2em] uppercase text-[#333] hover:text-[#555] transition-colors duration-200">
                Privacy Policy
            </a>
            <a th:href="@{/terms-of-service}"
               class="font-mono text-[9px] tracking-[0.2em] uppercase text-[#333] hover:text-[#555] transition-colors duration-200">
                Terms of Service
            </a>
            <a th:href="@{/refund-and-shipping}"
               class="font-mono text-[9px] tracking-[0.2em] uppercase text-[#333] hover:text-[#555] transition-colors duration-200">
                Refund &amp; Shipping
            </a>
        </div>
    </div>
</footer>

<!--
  ============================================================
  THEME TOGGLE SCRIPT
  ============================================================
-->
<script th:fragment="themeScript">
    function toggleDark() {
        var html = document.documentElement;
        if (html.classList.contains('dark')) {
            html.classList.remove('dark');
            localStorage.setItem('olly-theme', 'light');
        } else {
            html.classList.add('dark');
            localStorage.setItem('olly-theme', 'dark');
        }
    }
</script>

</html>
