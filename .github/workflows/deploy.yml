name: Deploy to AWS Elastic Beanstalk

on:
  workflow_dispatch:
    # Trigger this workflow manually from the GitHub Actions UI.
    # Go to: GitHub repo → Actions tab → "Deploy to AWS Elastic Beanstalk" → Run workflow

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Never ship a JAR whose tests haven't passed.
      # 'verify' runs the full lifecycle: compile → test → package.
      - name: Run tests and build JAR
        run: ./mvnw verify -B

      # Bundle the JAR with the Procfile and .ebextensions so EB applies
      # the config-as-code (health check path, port). A bare JAR deploy
      # would silently ignore both.
      - name: Build EB deploy bundle
        run: |
          mkdir -p bundle
          cp target/akuma-threads-0.0.1-SNAPSHOT.jar bundle/app.jar
          cp Procfile bundle/
          cp -r .ebextensions bundle/
          cd bundle && zip -r ../deploy-bundle.zip .

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: akuma-threads
          environment_name: akuma-threads-prod
          version_label: ${{ github.sha }}
          region: us-east-1
          deployment_package: deploy-bundle.zip
          use_existing_version_if_available: true
